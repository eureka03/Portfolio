        <main>

                <h1>Thanks for taking the time to reach out. How can i help you?</h1>
                <form action="mailto:eurekaripfumelo@gmail.com" method="post" enctype="text/plain">
                    <div class="inputs">
                        <div class="input-field">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" name="text" id="name" class="form-control" required >
                        </div>
                        <div class="input-field">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" name="email" id="email" class="form-control" required >
                        </div>
                    </div>    
                    <div class="message">
                        <label for="message" class="form-label">Message</label>
                        <textarea  class="form-control"id="message"></textarea>
                    </div>
                    <button class="btn btn-dark">Send</button>
                </form>
            </div>
